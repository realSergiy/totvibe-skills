<!DOCTYPE html>
<html lang="en">
<head><title>Shiki Whitespace</title></head>
<body>
<article>
    <h1>Shiki Inter-Span Whitespace</h1>
    <p>Code with whitespace text nodes between spans (HTML prettification artifacts):</p>
    <pre class="shiki"><code class="language-javascript"><span class="line">
      <span style="color:#C678DD">import</span>
      <span style="color:#ABB2BF"> </span>
      <span style="color:#E06C75">homepage</span>
      <span style="color:#ABB2BF"> </span>
      <span style="color:#C678DD">from</span>
      <span style="color:#ABB2BF"> </span>
      <span style="color:#98C379">"./index.html"</span>
      <span style="color:#ABB2BF">;</span>
    </span>
<span class="line">
      <span style="color:#C678DD">const</span>
      <span style="color:#ABB2BF"> </span>
      <span style="color:#E06C75">app</span>
      <span style="color:#ABB2BF"> = </span>
      <span style="color:#61AFEF">express</span>
      <span style="color:#ABB2BF">();</span>
    </span></code></pre>
</article>
</body>
</html>

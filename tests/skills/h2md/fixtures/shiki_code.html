<!DOCTYPE html>
<html lang="en">
<head><title>Shiki Example</title></head>
<body>
<article>
    <h1>Shiki Highlighted Code</h1>
    <p>Example of Shiki-style syntax highlighting:</p>
    <pre class="shiki"><code class="language-javascript"><span class="line"><span class="token keyword">const</span> <span class="token variable">app</span> <span class="token operator">=</span> <span class="token function">express</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span></span>
<span class="line"><span class="token variable">app</span><span class="token punctuation">.</span><span class="token function">listen</span><span class="token punctuation">(</span><span class="token number">3000</span><span class="token punctuation">)</span><span class="token punctuation">;</span></span></code></pre>
    <p>Another example with response handling:</p>
    <pre class="shiki"><code class="language-typescript"><span class="token keyword">const</span> <span class="token variable">res</span> <span class="token operator">=</span> <span class="token keyword">await</span> <span class="token class-name">Response</span><span class="token punctuation">.</span><span class="token function">json</span><span class="token punctuation">(</span><span class="token punctuation">{</span> <span class="token string">"ok"</span><span class="token punctuation">:</span> <span class="token boolean">true</span> <span class="token punctuation">}</span><span class="token punctuation">)</span><span class="token punctuation">;</span></span></code></pre>
</article>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dev Server</title>
    <meta property="og:title" content="Dev Server">
</head>
<body>
<article>
    <h1>Development Server</h1>
    <p>Start the dev server and see the output:</p>
    <div role="region" aria-label="Terminal output showing dev server startup">
        <span>Bun</span><span>v1.3.12</span><span>ready in</span><span>6.62</span><span>ms</span>
    </div>
    <p>The server binds to localhost by default.</p>
    <div role="region" aria-label="Command line input">
        <span>$</span><span>bun</span><span>run</span><span>dev</span>
    </div>
    <h2>Configuration</h2>
    <p>Configure the port via environment variable:</p>
    <pre><code class="language-bash">PORT=3000 bun run dev</code></pre>
</article>
</body>
</html>

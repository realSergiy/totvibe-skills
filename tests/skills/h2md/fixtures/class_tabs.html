<!DOCTYPE html>
<html lang="en">
<head><title>Class-Based Tabs</title></head>
<body>
<article>
    <h1>Installation</h1>
    <p>Choose your method:</p>
    <div class="CodeTabs">
        <div class="CodeBlockTab">curl</div>
        <div class="CodeBlockTab">npm</div>
        <div class="CodeBlockTab">brew</div>
        <div class="CodeBlockContent">
            <pre><code class="language-bash">curl -fsSL https://example.com/install.sh | bash</code></pre>
        </div>
        <div class="CodeBlockContent">
            <pre><code class="language-bash">npm install -g example</code></pre>
        </div>
        <div class="CodeBlockContent">
            <pre><code class="language-bash">brew install example</code></pre>
        </div>
    </div>
    <h2>Verify</h2>
    <p>Check it works.</p>
</article>
</body>
</html>

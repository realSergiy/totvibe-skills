<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Page Title from HTML</title>
    <meta property="og:title" content="OG Title Override">
    <meta property="og:description" content="OG description of the article">
    <meta property="og:url" content="https://example.com/canonical">
    <meta property="og:image" content="https://example.com/og-image.jpg">
    <meta property="og:site_name" content="Example Site">
    <meta property="article:published_time" content="2026-01-20T08:00:00Z">
    <meta name="twitter:title" content="Twitter Title">
    <meta name="twitter:description" content="Twitter description">
    <meta name="twitter:image" content="https://example.com/twitter-image.jpg">
    <meta name="author" content="HTML Meta Author">
    <meta name="description" content="HTML meta description">
    <link rel="canonical" href="https://example.com/canonical-link">
    <script type="application/ld+json">
    {
        "@type": "BlogPosting",
        "headline": "JSON-LD Headline",
        "author": {"@type": "Person", "name": "JSON-LD Author"},
        "datePublished": "2026-01-20T08:00:00Z",
        "description": "JSON-LD description"
    }
    </script>
</head>
<body>
<article>
    <h1>The Article</h1>
    <p>This article tests metadata extraction priority across multiple sources.</p>
</article>
</body>
</html>
